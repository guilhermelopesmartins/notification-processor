trigger:
  branches:
    include:
      - main
      - dev
      - feature/*

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  azureSubscription: 'azure-notification-processor-dev'
  functionAppName: 'func-notification-processor-dev'

stages:
  - stage: Build
    displayName: 'Build and Tests'
    jobs:
      - job: BuildAndTest
        displayName: 'Build, Test and Coverage'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 8'
            inputs:
              version: '8.x'

          - script: dotnet restore NotificationProcessor.sln
            displayName: 'Restore dependencies'

          - script: dotnet build NotificationProcessor.sln --configuration $(buildConfiguration) --no-restore
            displayName: 'Build'

          - script: >
              dotnet test NotificationProcessor.sln --no-build
              --configuration $(buildConfiguration)
              --collect:"XPlat Code Coverage"
              --results-directory $(Agent.TempDirectory)
              --logger trx
            displayName: 'Run tests'

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: always()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**/*.trx'
              searchFolder: '$(Agent.TempDirectory)'

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish code coverage'
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'

          - task: DotNetCoreCLI@2
            displayName: 'Publish Functions artifact'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: 'src/NotificationProcessor.Functions/NotificationProcessor.Functions.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/functions'

          - task: DotNetCoreCLI@2
            displayName: 'Publish Migrator artifact'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: 'src/NotificationProcessor.Migrator/NotificationProcessor.Migrator.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/migrator'

          - task: PublishBuildArtifacts@1
            displayName: 'Save artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'drop'

  - stage: Deploy
    displayName: 'Deploy to Dev'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    jobs:
      - deployment: DeployDev
        displayName: 'Deploy to Azure'
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureFunctionApp@2
                  displayName: 'Deploy Azure Functions'
                  inputs:
                    connectedServiceNameARM: '$(azureSubscription)'
                    appType: 'functionAppLinux'
                    appName: '$(functionAppName)'
                    package: '$(Pipeline.Workspace)/drop/functions/*.zip'
                    deploymentMethod: 'auto'